<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOWBAY — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary-blue: #3aa0ff;
    --primary-blue-dark: #2d7dd2;
    --primary-blue-light: #5cc8ff;
    --dark-navy: #0b1f3a;
    --medium-navy: #0f2a4d;
    --light-navy: #1a3a5a;
    --sidebar-bg: rgba(11, 31, 58, 0.95);
    --main-bg: radial-gradient(ellipse at center, #0f2a4d 0%, #0b1f3a 40%, #000814 100%);
    --card-bg: rgba(15, 42, 77, 0.4);
    --text-primary: #ffffff;
    --text-secondary: #b8c7d9;
    --text-muted: #8a9bae;
    --border-color: rgba(58, 160, 255, 0.15);
  }

  body {
    min-height: 100vh;
    background: var(--main-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(58, 160, 255, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(58, 160, 255, 0.05) 0%, transparent 40%),
      linear-gradient(135deg, var(--dark-navy) 0%, var(--medium-navy) 100%);
  }

  .grid-lines {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(58, 160, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58, 160, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .particles-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .particle {
    position: absolute;
    background: radial-gradient(circle, rgba(58, 160, 255, 0.8) 0%, rgba(58, 160, 255, 0) 70%);
    border-radius: 50%;
    animation: float 6s infinite ease-in-out;
    box-shadow: 0 0 20px rgba(58, 160, 255, 0.4);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-20px) translateX(10px); }
    50% { transform: translateY(10px) translateX(-10px); }
    75% { transform: translateY(-10px) translateX(20px); }
  }

  .wireframe-cube {
    position: fixed;
    bottom: 10%;
    right: 10%;
    width: 120px;
    height: 120px;
    z-index: 2;
    animation: rotateCube 10s infinite linear;
    pointer-events: none;
  }

  @keyframes rotateCube {
    0% { transform: rotateX(0deg) rotateY(0deg); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
  }

  .wireframe-cube::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid rgba(58, 160, 255, 0.6);
    background: rgba(58, 160, 255, 0.05);
    box-shadow: 
      0 0 30px rgba(58, 160, 255, 0.5),
      inset 0 0 30px rgba(58, 160, 255, 0.3);
    transform: perspective(200px) rotateX(45deg) rotateY(45deg);
  }

  .card {
    position: relative; z-index: 10;
    width: 420px;
    background: rgba(15, 42, 77, 0.4);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(58, 160, 255, 0.2);
    padding: 50px 44px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(58, 160, 255, 0.2), 0 0 40px rgba(58, 160, 255, 0.1);
    border-radius: 16px;
    transition: all 0.3s ease;
  }

  .logo-wrap { text-align: center; margin-bottom: 40px; }

  .logo {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ffffff 0%, var(--primary-blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    text-shadow: 0 0 40px rgba(58, 160, 255, 0.6);
  }

  .tagline {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
    display: block;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border-color);
  }
  .divider span { color: var(--text-muted); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  input {
    width: 100%;
    background: rgba(15, 42, 77, 0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(58, 160, 255, 0.2);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    transition: all 0.3s ease;
    outline: none;
  }

  input:focus {
    border-color: var(--primary-blue);
    background: rgba(15, 42, 77, 0.6);
    box-shadow: 0 0 25px rgba(58, 160, 255, 0.4);
    border-color: rgba(92, 200, 255, 0.5);
  }

  input::placeholder {
    color: var(--text-muted);
    opacity: 0.7;
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 100%);
    color: white;
    border: 1px solid rgba(92, 200, 255, 0.3);
    padding: 14px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s ease;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(58, 160, 255, 0.4);
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  }

  .btn-login:hover { 
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(58, 160, 255, 0.6);
    border-color: rgba(92, 200, 255, 0.5);
    background: linear-gradient(135deg, var(--primary-blue-light) 0%, var(--primary-blue) 100%);
  }
  .btn-login:active { transform: scale(0.99); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    background: rgba(220, 53, 69, 0.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(220, 53, 69, 0.3);
    color: #ff6b7a;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(220, 53, 69, 0.2);
  }

  .internal-badge {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .internal-badge span { 
    color: var(--primary-blue); 
    opacity: 0.8;
    text-shadow: 0 0 10px rgba(58, 160, 255, 0.3);
  }

  @media (max-width: 480px) {
    .card {
      width: 90%;
      padding: 30px 24px;
    }
    .logo {
      font-size: 24px;
      letter-spacing: 4px;
    }
    .wireframe-cube {
      width: 80px;
      height: 80px;
      bottom: 5%;
      right: 5%;
    }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="grid-lines"></div>
<div class="particles-container" id="particles"></div>
<div class="wireframe-cube"></div>

<div class="card">
  <div class="logo-wrap">
    <span class="logo">SHOWBAY</span>
    <span class="tagline">Email Marketing System</span>
  </div>

  <div class="divider"><span>Internal Access</span></div>

  <div id="errorMsg" class="error-msg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
  </form>

  <div class="internal-badge">
    <span>🔒</span> Authorized Staff Only
  </div>
</div>

<script src="/js/particles.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing In...';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/';
    } else {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
    }
  } catch (err) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
